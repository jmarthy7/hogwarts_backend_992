name: Primer flujo de trabajo CI/CD (Build, Test and Push Docker Image)

# ===== Disparadores del workflow =====
on:
  push:
    branches:
      - '**' # Se dispara en cualquier rama

# ===== Permisos =====
permissions:
  contents: read
  packages: write

# ===== Tareas del workflow =====
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. Descarga código
      - name: Checkout code
        uses: actions/checkout@v4 # Actualizado a v4

      # 2. Configuración de Java para tests y construcción
      - name: Configuración JDK
        uses: actions/setup-java@v4 # Actualizado a v4
        with:
          distribution: 'temurin'
          java-version: '23' # Corregido: Usa una versión válida (17, 21, etc.)

      - name: Construir proyecto con Maven
        run: mvn clean package

      # 3. Convertir nombre del repositorio a minúsculas
      # Es vital para Docker, ya que GHCR no acepta mayúsculas en los tags
      - name: Set lowercase repo name
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY@L}" >> $GITHUB_ENV

      # 4. Login en GitHub Container Registry (GHCR)
      # Es mejor hacer el login ANTES de intentar el build/push
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Construir y subir la imagen Docker
      - name: Build and Push Docker image
        run: |
          docker build -t ghcr.io/${{ env.REPO_LOWER }}:latest .
          docker push ghcr.io/${{ env.REPO_LOWER }}:latest
